<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.top-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.top-bar input,
.top-bar select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.top-bar input{
    flex:1;
}

#container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.item-name{
    font-weight:bold;
    font-size:18px;
}

.gear{
    cursor:pointer;
    font-size:20px;
}

.counter{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.counter button{
    width:40px;
    height:40px;
    font-size:20px;
}

.value{
    font-size:28px;
    font-weight:bold;
    min-width:60px;
    text-align:center;
}

.actions{
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
    padding:10px;
}

button{
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

/* --- Tela de Login Bimbo --- */
#login-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #003fa5 linear-gradient(135deg, #002d72 0%, #004bca 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-bg-decor {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
}

.login-bg-decor::before, .login-bg-decor::after {
    content: "";
    position: absolute;
    width: 250px;
    height: 80px;
    background: #e41b13;
    transform: skewX(-35deg);
}

.login-bg-decor::before { top: 0; right: -50px; }
.login-bg-decor::after { bottom: 0; left: -50px; }

.login-box {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px 30px;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    color: white;
    position: relative;
}

.brand-logo {
    background: white;
    padding: 8px 15px;
    border-radius: 8px;
    display: inline-block;
    font-weight: 900;
    color: #e41b13;
    font-size: 22px;
    letter-spacing: -1px;
    margin-bottom: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.brand-logo span {
    display: block;
    font-size: 9px;
    color: #002d72;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: -4px;
}

.lock-icon {
    font-size: 32px;
    margin-bottom: 15px;
    opacity: 0.9;
}

.login-box h2 {
    font-size: 24px;
    margin-bottom: 8px;
    font-weight: 600;
}

.login-box p {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 25px;
}

.input-container {
    position: relative;
    margin-bottom: 20px;
}

.input-container input {
    width: 100%;
    padding: 14px 16px 14px 40px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    color: white;
    font-size: 16px;
    outline: none;
    transition: 0.2s;
}

.input-container input:focus {
    border-color: #ffffff;
    background: rgba(0, 0, 0, 0.3);
}

.input-container ::placeholder {
    color: #94a3b8;
}

.input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

.btn-login {
    width: 100%;
    padding: 14px;
    background: #e41b13;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.2s;
    letter-spacing: 1px;
}

.btn-login:hover {
    background: #c9130d;
    opacity: 1;
}

.error-msg {
    color: #ff8a8a;
    font-size: 13px;
    margin-top: 12px;
    display: none;
}
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-bg-decor"></div>
    <div class="login-box">
        <div class="brand-logo">
            <span>Grupo</span>BIMBO
        </div>
        <div class="lock-icon">🔒</div>
        <h2>Acesso Restrito</h2>
        <p>Digite a senha para continuar</p>
        
        <div class="input-container">
            <span class="input-icon">🔑</span>
            <input type="password" id="login-password" placeholder="Senha">
        </div>
        
        <button class="btn-login" id="btn-entrar">ENTRAR</button>
        <div class="error-msg" id="login-error">Senha incorreta. Tente novamente.</div>
    </div>
</div>

<h1>Controle de Estoque</h1>

<div class="top-bar">
    <input type="text" id="search" placeholder="Pesquisar item...">

    <select id="sort">
        <option value="nameAsc">Nome A-Z</option>
        <option value="nameDesc">Nome Z-A</option>
        <option value="qtyDesc">Maior Quantidade</option>
        <option value="qtyAsc">Menor Quantidade</option>
    </select>

    <select id="filter">
        <option value="all">Todos</option>
        <option value="zero">Zerados</option>
        <option value="positive">Acima de 0</option>
        <option value="below10">Abaixo de 10</option>
        <option value="above100">Acima de 100</option>
    </select>
</div>

<div id="container"></div>
<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getDatabase, ref, set, onValue } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyCrSgho0Y05w8JBZze612-nt5DjMOfBUrs",
  authDomain: "://firebaseapp.com",
  databaseURL: "https://firebaseio.com",
  projectId: "controle-estoque-c3001",
  storageBucket: "://appspot.com",
  messagingSenderId: "944420672508",
  appId: "1:944420672508:web:e5f4ec0a3c498b2b2c1879"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const DB_PATH = "estoque";

let items = [];

function init() {
    const dbRef = ref(db, DB_PATH);
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data && Array.isArray(data)) {
            items = data;
        } else {
            items = [];
            for (let i = 1; i <= 200; i++) {
                items.push({ id: i, name: `Item ${i}`, qty: 0 });
            }
            set(dbRef, items);
        }
        render();
    });
}

function save() {
    set(ref(db, DB_PATH), items);
}

function find(id) {
    return items.find(i => i.id === id);
}

function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const sort = document.getElementById("sort").value;
    const filter = document.getElementById("filter").value;

    let list = [...items];
    list = list.filter(i => i.name.toLowerCase().includes(search));

    if (filter === "zero") list = list.filter(i => i.qty === 0);
    if (filter === "positive") list = list.filter(i => i.qty > 0);
    if (filter === "below10") list = list.filter(i => i.qty < 10);
    if (filter === "above100") list = list.filter(i => i.qty > 100);

    if (sort === "nameAsc") {
        list.sort((a,b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    }
    if (sort === "nameDesc") {
        list.sort((a,b) => b.name.localeCompare(a.name, undefined, { numeric: true, sensitivity: 'base' }));
    }
    if (sort === "qtyAsc") {
        list.sort((a,b) => a.qty - b.qty);
    }
    if (sort === "qtyDesc") {
        list.sort((a,b) => b.qty - a.qty);
    }

    const container = document.getElementById("container");
    container.innerHTML = "";

    list.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-header">
                <span class="item-name">${item.name}</span>
                <span class="gear" onclick="renameItem(${item.id})">⚙️</span>
            </div>
            <div class="counter">
                <button onclick="changeQty(${item.id},-1)">−</button>
                <div class="value">${item.qty}</div>
                <button onclick="changeQty(${item.id},1)">+</button>
            </div>
            <div class="actions">
                <button onclick="addAmount(${item.id})">Adicionar</button>
                <button onclick="removeAmount(${item.id})">Retirar</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function changeQty(id, value) {
    const item = find(id);
    item.qty = Math.max(0, item.qty + value);
    save();
}

function addAmount(id) {
    const amount = parseInt(prompt("Quantidade para adicionar:"));
    if (amount > 0) {
        find(id).qty += amount;
        save();
    }
}

function removeAmount(id) {
    const amount = parseInt(prompt("Quantidade para retirar:"));
    if (amount > 0) {
        find(id).qty = Math.max(0, find(id).qty - amount);
        save();
    }
}

function renameItem(id) {
    const item = find(id);
    const newName = prompt("Novo nome:", item.name);
    if (newName?.trim()) {
        item.name = newName.trim();
        save();
    }
}

// LÓGICA DE LOGIN DIRETA VIA EVENT LISTENER (EVITA CONFLITO DE ESCOPO)
function checkPassword() {
    const pass = document.getElementById("login-password").value;
    const err = document.getElementById("login-error");
    if (pass === "Almoxarifado@Bimbo2026") {
        document.getElementById("login-screen").style.display = "none";
    } else {
        err.style.display = "block";
    }
}

document.getElementById("btn-entrar").addEventListener("click", checkPassword);
document.getElementById("login-password").addEventListener("keypress", (e) => {
    if (e.key === "Enter") checkPassword();
});

document.getElementById("search").addEventListener("input", render);
document.getElementById("sort").addEventListener("change", render);
document.getElementById("filter").addEventListener("change", render);

window.changeQty = changeQty;
window.addAmount = addAmount;
window.removeAmount = removeAmount;
window.renameItem = renameItem;

init();
</script>
</body>
</html>
