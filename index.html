<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Estoque</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#e9eef7;
    padding:15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ================= LOGIN ================= */

#loginScreen{
    position:fixed;
    inset:0;
    background:#0037b3;
    background-image:url("login-bimbo.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:99999;
}

#passwordArea{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,80px);
    width:min(820px,85vw);
}

#passwordInput{
    width:100%;
    height:92px;
    background:rgba(0,0,0,.12);
    border:2px solid rgba(255,255,255,.45);
    border-radius:18px;
    outline:none;
    color:white;
    font-size:34px;
    padding-left:35px;
}

#loginBtn{
    width:100%;
    height:90px;
    margin-top:28px;
    border:none;
    border-radius:18px;
    background:#e4001b;
    color:white;
    font-size:38px;
    font-weight:bold;
    cursor:pointer;
}

#errorMsg{
    margin-top:18px;
    text-align:center;
    color:#ffd2d2;
    font-size:22px;
    font-weight:bold;
}

/* ================= HEADER ================= */

.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    margin-bottom:25px;
    flex-shrink: 0;
}

/* LOGO - Aumentada levemente conforme solicitado */
#topLogo{
    width:105px;
    height:auto;
}

/* TÍTULO CENTRAL */
.title-container{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

/* TÍTULO PRINCIPAL */
.title-container h1{
    color:#002b73;
    font-size:34px;
    margin:0;
    white-space:nowrap;
}

/* SUBTÍTULO - Alterado conforme solicitado */
.title-container h2{
    font-size:16px;
    color:#3b5ea8;
    margin-top:4px;
    font-weight:normal;
}

/* ================= TOP BAR ================= */

.top-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
    flex-shrink: 0;
}

.top-bar input,
.top-bar select{
    padding:12px;
    border:2px solid #0f4fb8;
    border-radius:12px;
    font-size:16px;
    background:white;
    color:#001c4a;
    font-weight:bold;
}

.top-bar input{
    flex:1;
}

/* ================= VIEWPORT VIRTUALIZADO (ANTI-TRAVAMENTO) ================= */

.virtual-viewport {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    padding-right: 5px;
}

.virtual-content {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
}

/* ================= CARD ================= */

.card{
    background:linear-gradient(180deg,#0f4fb8,#002b73);
    border-radius:18px;
    padding:16px;
    box-shadow:0 4px 12px rgba(0,0,0,.22);
    height: 190px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height: 30px;
}

.item-name{
    font-weight:bold;
    font-size:20px;
    color:white;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 85%;
}

.gear{
    cursor:pointer;
    font-size:22px;
    color:white;
}

/* ================= CONTADOR ================= */

.counter{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.counter button{
    width:48px;
    height:48px;
    font-size:24px;
    font-weight:bold;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}

.counter button:first-child{
    background:#d91c1c;
}

.counter button:last-child{
    background:#00b140;
}

.value{
    font-size:32px;
    font-weight:bold;
    min-width:85px;
    text-align:center;
    background:#001c4a;
    color:white;
    padding:6px 16px;
    border-radius:14px;
    border:2px solid #2f7fff;
}

/* ================= AÇÕES ================= */

.actions{
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.actions button:first-child{
    background:#12a150;
}

.actions button:last-child{
    background:#d91c1c;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    body{
        padding:10px;
    }

    #topLogo{
        width:78px;
    }

    .title-container h1{
        font-size:20px;
        white-space:nowrap;
    }

    .title-container h2{
        font-size:13px;
    }

    #passwordArea{
        width:88vw;
        transform:translate(-50%,55px);
    }

    #passwordInput{
        height:68px;
        font-size:24px;
        padding-left:22px;
    }

    #loginBtn{
        height:66px;
        font-size:28px;
    }

    .top-bar{
        flex-direction:column;
        gap: 8px;
    }

    .top-bar input,
    .top-bar select{
        width:100%;
    }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div id="passwordArea">
        <input type="password" id="passwordInput" placeholder="Digite a senha">
        <button id="loginBtn" onclick="checkPassword()">ENTRAR</button>
        <div id="errorMsg"></div>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <img src="bimbo-logo.png" id="topLogo">
    <div class="title-container">
        <h1>Controle de Estoque</h1>
        <h2>Almoxarifado de Manutenção</h2>
    </div>
</div>

<!-- TOP BAR -->
<div class="top-bar">
    <input type="text" id="search" placeholder="Pesquisar item...">

    <select id="sort">
        <option value="nameAsc">Nome A-Z</option>
        <option value="nameDesc">Nome Z-A</option>
        <option value="qtyDesc">Maior Quantidade</option>
        <option value="qtyAsc">Menor Quantidade</option>
    </select>

    <select id="filter">
        <option value="all">Todos</option>
        <option value="zero">Zerados</option>
        <option value="positive">Acima de 0</option>
        <option value="below10">Abaixo de 10</option>
        <option value="above100">Acima de 100</option>
    </select>
</div>

<!-- CONTAINER ADAPTADO PARA ROLAGEM VIRTUALIZADA DE ALTA PERFORMANCE -->
<div class="virtual-viewport" id="viewport">
    <div class="virtual-content" id="container"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getDatabase,
    ref,
    set,
    onValue
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCrSgho0Y05w8JBZze612-nt5DjMOfBUrs",
    authDomain: "controle-estoque-c3001.firebaseapp.com",
    databaseURL: "https://controle-estoque-c3001-default-rtdb.firebaseio.com",
    projectId: "controle-estoque-c3001",
    storageBucket: "controle-estoque-c3001.appspot.com",
    messagingSenderId: "944420672508",
    appId: "1:944420672508:web:e5f4ec0a3c498b2b2c1879"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const DB_PATH = "estoque";
const ACCESS_PASSWORD = "Almoxarifado@Bimbo2026";

let items = [];
let listCalculated = []; 
let initialized = false;

// Configurações de Grid Dinâmico para a Virtualização
const CARD_HEIGHT = 190;
const GAP = 16;
let columnsCount = 4;

/* LOGIN */
function checkPassword(){
    const input = document.getElementById("passwordInput").value;

    if(input === ACCESS_PASSWORD){
        sessionStorage.setItem("bimboLogged","true");
        document.getElementById("loginScreen").style.display = "none";

        if(!initialized){
            init();
            initialized = true;
        }
    } else {
        document.getElementById("errorMsg").innerText = "Senha incorreta";
    }
}

window.checkPassword = checkPassword;

document.addEventListener("keydown",(e)=>{
    if(e.key === "Enter") checkPassword();
});

if(sessionStorage.getItem("bimboLogged")){
    document.getElementById("loginScreen").style.display = "none";
    init();
    initialized = true;
}

/* INIT */
function init(){
    const dbRef = ref(db, DB_PATH);

    onValue(dbRef,(snapshot)=>{
        if(snapshot.exists()){
            items = snapshot.val();
        } else {
            items = [];
            // Força a criação de 2500 contadores se a base de dados estiver vazia
            for(let i=1;i<=2500;i++){
                items.push({ id:i, name:`Item ${i}`, qty:0 });
            }
            set(dbRef, items);
        }

        updateColumnsCount();
        calculateListAndRender();
    });
}

function save(){
    set(ref(db, DB_PATH), items);
}

function find(id){
    return items.find(i=> i && i.id===id);
}

function updateColumnsCount() {
    const w = window.innerWidth;
    if (w < 640) columnsCount = 1;
    else if (w < 960) columnsCount = 2;
    else if (w < 1300) columnsCount = 3;
    else columnsCount = 4;
}

/* COMPUTA FILTROS E CONSTRÓI A VISUALIZAÇÃO VIRTUAL */
function calculateListAndRender() {
    const search = document.getElementById("search").value.toLowerCase();
    const sort = document.getElementById("sort").value;
    const filter = document.getElementById("filter").value;

    let list = [...items].filter(i => i !== null);

    if (search) {
        list = list.filter(item =>
            item.name && item.name.toLowerCase().includes(search)
        );
    }

    switch(filter){
        case "zero": list = list.filter(i=>i.qty===0); break;
        case "positive": list = list.filter(i=>i.qty>0); break;
        case "below10": list = list.filter(i=>i.qty<10); break;
        case "above100": list = list.filter(i=>i.qty>100); break;
    }

    const collator = new Intl.Collator(undefined, {
        numeric: true,
        sensitivity: "base"
    });

    switch(sort){
        case "nameAsc":  list.sort((a,b) => collator.compare(a.name || "", b.name || "")); break;
        case "nameDesc": list.sort((a,b) => collator.compare(b.name || "", a.name || "")); break;
        case "qtyAsc":   list.sort((a,b)=>(a.qty || 0)-(b.qty || 0)); break;
        case "qtyDesc":  list.sort((a,b)=>(b.qty || 0)-(a.qty || 0)); break;
    }

    listCalculated = list;
    renderVirtualScroll();
}

function renderVirtualScroll() {
    const viewport = document.getElementById("viewport");
    const container = document.getElementById("container");
    
    const totalRows = Math.ceil(listCalculated.length / columnsCount);
    const totalHeight = totalRows * (CARD_HEIGHT + GAP);
    container.style.height = `${totalHeight}px`;

    const scrollTop = viewport.scrollTop;
    const viewportHeight = viewport.clientHeight;

    const startRow = Math.max(0, Math.floor(scrollTop / (CARD_HEIGHT + GAP)) - 1);
    const endRow = Math.min(totalRows, Math.ceil((scrollTop + viewportHeight) / (CARD_HEIGHT + GAP)) + 1);

    const startIndex = startRow * columnsCount;
    const endIndex = Math.min(listCalculated.length, endRow * columnsCount);

    container.innerHTML = "";

    for (let i = startIndex; i < endIndex; i++) {
        const item = listCalculated[i];
        if (!item) continue;

        const col = i % columnsCount;
        const row = Math.floor(i / columnsCount);
        const posX = `calc(${col} * (100% / ${columnsCount}))`;
        const posY = row * (CARD_HEIGHT + GAP);

        const card = document.createElement("div");
        card.className = "card";
        card.style.position = "absolute";
        card.style.top = `${posY}px`;
        card.style.left = posX;
        card.style.width = `calc((100% / ${columnsCount}) - ${(columnsCount - 1) * GAP / columnsCount}px)`;
        if(col > 0) card.style.marginLeft = `${(col * GAP) / columnsCount}px`;

        card.innerHTML = `
            <div class="card-header">
                <span class="item-name">${item.name}</span>
                <span class="gear" onclick="renameItem(${item.id})">⚙️</span>
            </div>

            <div class="counter">
                <button onclick="changeQty(${item.id},-1)">−</button>
                <div class="value">${item.qty}</div>
                <button onclick="changeQty(${item.id},1)">+</button>
            </div>

            <div class="actions">
                <button onclick="addAmount(${item.id})">Adicionar</button>
                <button onclick="removeAmount(${item.id})">Retirar</button>
            </div>
        `;

        container.appendChild(card);
    }
}

/* ACTIONS */
function changeQty(id,v){
    const item = find(id);
    if(!item) return;
    item.qty = (item.qty || 0) + v;
    if(item.qty < 0) item.qty = 0;
    save();
}

function addAmount(id){
    const amount = parseInt(prompt("Quantidade para adicionar:"));
    if(isNaN(amount)||amount<=0) return;
    const item = find(id);
    if(item) {
        item.qty = (item.qty || 0) + amount;
        save();
    }
}

function removeAmount(id){
    const amount = parseInt(prompt("Quantidade para retirar:"));
    if(isNaN(amount)||amount<=0) return;
    const item = find(id);
    if(item) {
        item.qty = (item.qty || 0) - amount;
        if(item.qty < 0) item.qty = 0;
        save();
    }
}

function renameItem(id){
    const item = find(id);
    if(!item) return;
    const newName = prompt("Novo nome:", item.name);
    if(!newName) return;
    item.name = newName.trim();
    save();
}

/* EVENTS */
document.getElementById("search").addEventListener("input", calculateListAndRender);
document.getElementById("sort").addEventListener("change", calculateListAndRender);
document.getElementById("filter").addEventListener("change", calculateListAndRender);

document.getElementById("viewport").addEventListener("scroll", () => {
    window.requestAnimationFrame(renderVirtualScroll);
});

window.addEventListener("resize", () => {
    updateColumnsCount();
    renderVirtualScroll();
});

window.changeQty = changeQty;
window.addAmount = addAmount;
window.removeAmount = removeAmount;
window.renameItem = renameItem;

</script>

</body>
</html>
