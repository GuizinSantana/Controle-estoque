<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Estoque</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#e9eef7;
    padding:15px;
}

/* ================= LOGIN ================= */

#loginScreen{

    position:fixed;
    inset:0;

    background:#0037b3;

    background-image:url("login-bimbo.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    z-index:99999;
}

#passwordArea{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%, 80px);

    width:min(820px,85vw);
}

#passwordInput{

    width:100%;

    height:92px;

    background:rgba(0,0,0,.12);

    border:2px solid rgba(255,255,255,.45);

    border-radius:18px;

    outline:none;

    color:white;

    font-size:34px;

    padding-left:35px;

    transition:.2s;
}

#passwordInput:focus{

    border-color:white;

    background:rgba(255,255,255,.08);
}

#passwordInput::placeholder{
    color:rgba(255,255,255,.75);
}

/* BOTÃO LOGIN */

#loginBtn{

    width:100%;

    height:90px;

    margin-top:28px;

    border:none;

    border-radius:18px;

    background:#e4001b;

    color:white;

    font-size:38px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;
}

#loginBtn:hover{
    opacity:.95;
}

#errorMsg{

    margin-top:18px;

    text-align:center;

    color:#ffd2d2;

    font-size:22px;

    font-weight:bold;
}

/* ================= APP ================= */

h1{

    text-align:center;

    margin-bottom:22px;

    font-size:34px;

    color:#002b73;
}

/* TOP BAR */

.top-bar{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:20px;
}

.top-bar input,
.top-bar select{

    padding:12px;

    border:2px solid #0b4fb3;

    border-radius:12px;

    font-size:16px;

    background:white;

    color:#001b44;

    font-weight:bold;

    box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.top-bar input::placeholder{

    color:#5b6f8f;
}

.top-bar input{
    flex:1;
}

/* GRID */

#container{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(280px,1fr));

    gap:16px;
}

/* CARD */

.card{

    background:linear-gradient(
        180deg,
        #0f4fb8,
        #002b73
    );

    border-radius:18px;

    padding:16px;

    box-shadow:0 4px 12px rgba(0,0,0,.22);

    border:1px solid rgba(255,255,255,.12);
}

/* HEADER */

.card-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:16px;
}

.item-name{

    font-weight:bold;

    font-size:20px;

    color:white;
}

.gear{

    cursor:pointer;

    font-size:22px;

    color:white;
}

/* CONTADOR */

.counter{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;

    margin-bottom:16px;
}

/* BOTÕES + E - */

.counter button{

    width:48px;

    height:48px;

    font-size:24px;

    font-weight:bold;

    background:#e4001b;

    color:white;

    border-radius:14px;

    transition:.2s;
}

.counter button:hover{

    transform:scale(1.05);
}

/* NÚMERO */

.value{

    font-size:32px;

    font-weight:bold;

    min-width:85px;

    text-align:center;

    background:#001c4a;

    color:white;

    padding:10px 16px;

    border-radius:14px;

    border:2px solid #2f7fff;
}

/* AÇÕES */

.actions{

    display:flex;

    gap:10px;
}

.actions button{

    flex:1;

    padding:12px;

    font-size:15px;

    font-weight:bold;

    color:white;

    border-radius:12px;

    transition:.2s;
}

.actions button:first-child{

    background:#12a150;
}

.actions button:last-child{

    background:#d91c1c;
}

.actions button:hover{

    transform:translateY(-1px);
}

/* BOTÕES GERAIS */

button{

    border:none;

    cursor:pointer;
}

button:hover{
    opacity:.94;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    body{
        padding:10px;
    }

    #passwordArea{

        width:88vw;

        transform:translate(-50%, 55px);
    }

    #passwordInput{

        height:68px;

        font-size:24px;

        border-radius:14px;

        padding-left:22px;
    }

    #loginBtn{

        height:66px;

        margin-top:18px;

        font-size:28px;

        border-radius:14px;
    }

    #errorMsg{

        font-size:18px;
    }

    h1{
        font-size:26px;
    }

    .top-bar{

        flex-direction:column;
    }

    .top-bar input,
    .top-bar select{

        width:100%;
    }

    #container{

        grid-template-columns:1fr;
    }

    .card{

        padding:14px;
    }

    .item-name{

        font-size:18px;
    }

    .value{

        font-size:28px;
    }

}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="loginScreen">

    <div id="passwordArea">

        <input
            type="password"
            id="passwordInput"
            placeholder="Digite a senha"
        >

        <button
            id="loginBtn"
            onclick="checkPassword()"
        >
            ENTRAR
        </button>

        <div id="errorMsg"></div>

    </div>

</div>

<!-- ================= APP ================= -->

<h1>Controle de Estoque</h1>

<div class="top-bar">

    <input
        type="text"
        id="search"
        placeholder="Pesquisar item..."
    >

    <select id="sort">

        <option value="nameAsc">
            Nome A-Z
        </option>

        <option value="nameDesc">
            Nome Z-A
        </option>

        <option value="qtyDesc">
            Maior Quantidade
        </option>

        <option value="qtyAsc">
            Menor Quantidade
        </option>

    </select>

    <select id="filter">

        <option value="all">
            Todos
        </option>

        <option value="zero">
            Zerados
        </option>

        <option value="positive">
            Acima de 0
        </option>

        <option value="below10">
            Abaixo de 10
        </option>

        <option value="above100">
            Acima de 100
        </option>

    </select>

</div>

<div id="container"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

    getDatabase,
    ref,
    set,
    onValue

} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {

    apiKey:
    "AIzaSyCrSgho0Y05w8JBZze612-nt5DjMOfBUrs",

    authDomain:
    "controle-estoque-c3001.firebaseapp.com",

    databaseURL:
    "https://controle-estoque-c3001-default-rtdb.firebaseio.com",

    projectId:
    "controle-estoque-c3001",

    storageBucket:
    "controle-estoque-c3001.appspot.com",

    messagingSenderId:
    "944420672508",

    appId:
    "1:944420672508:web:e5f4ec0a3c498b2b2c1879",

    measurementId:
    "G-0BYJFFKMKH"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const DB_PATH = "estoque";

const ACCESS_PASSWORD =
"Almoxarifado@Bimbo2026";

const LOGIN_TIME =
3 * 60 * 60 * 1000;

let items = [];

let initialized = false;

/* ================= LOGIN ================= */

function checkPassword(){

    const input =
    document.getElementById("passwordInput").value;

    if(input === ACCESS_PASSWORD){

        sessionStorage.setItem(
            "bimboAuthTime",
            Date.now()
        );

        document
        .getElementById("loginScreen")
        .style.display = "none";

        if(!initialized){

            init();

            initialized = true;
        }

    }else{

        document
        .getElementById("errorMsg")
        .innerText = "Senha incorreta";
    }
}

window.checkPassword = checkPassword;

document.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){
        checkPassword();
    }

});

/* ================= AUTO LOGIN ================= */

const savedLogin =
sessionStorage.getItem("bimboAuthTime");

if(savedLogin){

    const now = Date.now();

    const diff =
    now - Number(savedLogin);

    if(diff < LOGIN_TIME){

        document
        .getElementById("loginScreen")
        .style.display = "none";

        init();

        initialized = true;
    }
}

/* ================= INIT ================= */

function init(){

    const dbRef = ref(db, DB_PATH);

    onValue(dbRef,(snapshot)=>{

        if(snapshot.exists()){

            items = snapshot.val();

        }else{

            items = [];

            for(let i=1;i<=200;i++){

                items.push({

                    id:i,

                    name:`Item ${i}`,

                    qty:0
                });
            }

            set(dbRef, items);
        }

        render();
    });
}

/* ================= SAVE ================= */

function save(){

    set(
        ref(db, DB_PATH),
        items
    );
}

/* ================= FIND ================= */

function find(id){

    return items.find(i => i.id === id);
}

/* ================= RENDER ================= */

function render(){

    const search =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    const sort =
    document
    .getElementById("sort")
    .value;

    const filter =
    document
    .getElementById("filter")
    .value;

    let list = [...items];

    list = list.filter(item =>
        item.name
        .toLowerCase()
        .includes(search)
    );

    switch(filter){

        case "zero":
            list = list.filter(i => i.qty === 0);
            break;

        case "positive":
            list = list.filter(i => i.qty > 0);
            break;

        case "below10":
            list = list.filter(i => i.qty < 10);
            break;

        case "above100":
            list = list.filter(i => i.qty > 100);
            break;
    }

    switch(sort){

        case "nameAsc":

            list.sort((a,b)=>
                a.name.localeCompare(
                    b.name,
                    undefined,
                    { numeric:true }
                )
            );

            break;

        case "nameDesc":

            list.sort((a,b)=>
                b.name.localeCompare(
                    a.name,
                    undefined,
                    { numeric:true }
                )
            );

            break;

        case "qtyAsc":
            list.sort((a,b)=>a.qty-b.qty);
            break;

        case "qtyDesc":
            list.sort((a,b)=>b.qty-a.qty);
            break;
    }

    const container =
    document.getElementById("container");

    container.innerHTML = "";

    list.forEach(item=>{

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="card-header">

                <span class="item-name">
                    ${item.name}
                </span>

                <span
                    class="gear"
                    onclick="renameItem(${item.id})"
                >
                    ⚙️
                </span>

            </div>

            <div class="counter">

                <button onclick="changeQty(${item.id},-1)">
                    −
                </button>

                <div class="value">
                    ${item.qty}
                </div>

                <button onclick="changeQty(${item.id},1)">
                    +
                </button>

            </div>

            <div class="actions">

                <button onclick="addAmount(${item.id})">
                    Adicionar
                </button>

                <button onclick="removeAmount(${item.id})">
                    Retirar
                </button>

            </div>
        `;

        container.appendChild(card);
    });
}

/* ================= ACTIONS ================= */

function changeQty(id,value){

    const item = find(id);

    item.qty += value;

    if(item.qty < 0){
        item.qty = 0;
    }

    save();
}

function addAmount(id){

    const amount = parseInt(
        prompt("Quantidade para adicionar:")
    );

    if(isNaN(amount) || amount <= 0){
        return;
    }

    find(id).qty += amount;

    save();
}

function removeAmount(id){

    const amount = parseInt(
        prompt("Quantidade para retirar:")
    );

    if(isNaN(amount) || amount <= 0){
        return;
    }

    const item = find(id);

    item.qty -= amount;

    if(item.qty < 0){
        item.qty = 0;
    }

    save();
}

function renameItem(id){

    const item = find(id);

    const newName = prompt(
        "Novo nome:",
        item.name
    );

    if(!newName || !newName.trim()){
        return;
    }

    item.name = newName.trim();

    save();
}

/* ================= EVENTS ================= */

document
.getElementById("search")
.addEventListener("input",render);

document
.getElementById("sort")
.addEventListener("change",render);

document
.getElementById("filter")
.addEventListener("change",render);

/* ================= GLOBAL ================= */

window.changeQty = changeQty;

window.addAmount = addAmount;

window.removeAmount = removeAmount;

window.renameItem = renameItem;

</script>

</body>
</html>
