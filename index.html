<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.top-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.top-bar input,
.top-bar select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.top-bar input{
    flex:1;
}

#container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.item-name{
    font-weight:bold;
    font-size:18px;
}

.gear{
    cursor:pointer;
    font-size:20px;
}

.counter{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.counter button{
    width:40px;
    height:40px;
    font-size:20px;
}

.value{
    font-size:28px;
    font-weight:bold;
    min-width:60px;
    text-align:center;
}

.actions{
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
    padding:10px;
}

button{
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<h1>Controle de Estoque</h1>

<div class="top-bar">
    <input type="text" id="search" placeholder="Pesquisar item...">

    <select id="sort">
        <option value="nameAsc">Nome A-Z</option>
        <option value="nameDesc">Nome Z-A</option>
        <option value="qtyDesc">Maior Quantidade</option>
        <option value="qtyAsc">Menor Quantidade</option>
    </select>

    <select id="filter">
        <option value="all">Todos</option>
        <option value="zero">Zerados</option>
        <option value="positive">Acima de 0</option>
        <option value="below10">Abaixo de 10</option>
        <option value="above100">Acima de 100</option>
    </select>
</div>

<div id="container"></div>

<script>

const STORAGE_KEY = "estoque200";

let items = JSON.parse(localStorage.getItem(STORAGE_KEY));

if(!items){
    items = [];
    for(let i=1;i<=200;i++){
        items.push({
            id:i,
            name:`Item ${i}`,
            qty:0
        });
    }
}

function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function render(){

    const search =
        document.getElementById("search")
        .value
        .toLowerCase();

    const sort =
        document.getElementById("sort").value;

    const filter =
        document.getElementById("filter").value;

    let list = [...items];

    list = list.filter(item =>
        item.name.toLowerCase().includes(search)
    );

    switch(filter){

        case "zero":
            list=list.filter(i=>i.qty===0);
            break;

        case "positive":
            list=list.filter(i=>i.qty>0);
            break;

        case "below10":
            list=list.filter(i=>i.qty<10);
            break;

        case "above100":
            list=list.filter(i=>i.qty>100);
            break;
    }

    switch(sort){

        case "nameAsc":
            list.sort((a,b)=>a.name.localeCompare(b.name));
            break;

        case "nameDesc":
            list.sort((a,b)=>b.name.localeCompare(a.name));
            break;

        case "qtyAsc":
            list.sort((a,b)=>a.qty-b.qty);
            break;

        case "qtyDesc":
            list.sort((a,b)=>b.qty-a.qty);
            break;
    }

    const container =
        document.getElementById("container");

    container.innerHTML="";

    list.forEach(item=>{

        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="card-header">
                <span class="item-name">${item.name}</span>
                <span class="gear"
                    onclick="renameItem(${item.id})">
                    ⚙️
                </span>
            </div>

            <div class="counter">
                <button onclick="changeQty(${item.id},-1)">−</button>
                <div class="value">${item.qty}</div>
                <button onclick="changeQty(${item.id},1)">+</button>
            </div>

            <div class="actions">
                <button onclick="addAmount(${item.id})">
                    Adicionar
                </button>

                <button onclick="removeAmount(${item.id})">
                    Retirar
                </button>
            </div>
        `;

        container.appendChild(card);
    });
}

function find(id){
    return items.find(i=>i.id===id);
}

function changeQty(id,value){

    const item=find(id);

    item.qty+=value;

    if(item.qty<0){
        item.qty=0;
    }

    save();
    render();
}

function addAmount(id){

    const amount=parseInt(
        prompt("Quantidade para adicionar:")
    );

    if(isNaN(amount) || amount<=0){
        return;
    }

    find(id).qty+=amount;

    save();
    render();
}

function removeAmount(id){

    const amount=parseInt(
        prompt("Quantidade para retirar:")
    );

    if(isNaN(amount) || amount<=0){
        return;
    }

    const item=find(id);

    item.qty-=amount;

    if(item.qty<0){
        item.qty=0;
    }

    save();
    render();
}

function renameItem(id){

    const item=find(id);

    const newName=prompt(
        "Novo nome:",
        item.name
    );

    if(!newName || !newName.trim()){
        return;
    }

    item.name=newName.trim();

    save();
    render();
}

document.getElementById("search")
.addEventListener("input",render);

document.getElementById("sort")
.addEventListener("change",render);

document.getElementById("filter")
.addEventListener("change",render);

render();

</script>

</body>
</html>
